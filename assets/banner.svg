<svg width="900" height="230" viewBox="0 0 900 230" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Arun Roshan GJ, aka RoshZen">
  <title>Arun Roshan GJ — RoshZen</title>
  <defs>
    <clipPath id="cardClip">
      <rect x="2" y="2" width="896" height="226" rx="16" ry="16"/>
    </clipPath>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="2" fill="#ffffff" opacity="0.025"/>
    </pattern>
    <style>
      text { font-family: Consolas, Menlo, Monaco, 'Courier New', monospace; }
      .cursor { animation: blink 1.1s steps(1) infinite; }
      @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
      .border-glow { animation: pulseGlow 3.2s ease-in-out infinite; }
      @keyframes pulseGlow { 0%, 100% { stroke-opacity: 0.35; } 50% { stroke-opacity: 0.85; } }
      .ghost-c { animation: shiftC 3.6s ease-in-out infinite; }
      .ghost-m { animation: shiftM 3.6s ease-in-out infinite; }
      @keyframes shiftC { 0%, 100% { transform: translate(0,0); opacity: 0.45; } 50% { transform: translate(1.4px,0); opacity: 0.22; } }
      @keyframes shiftM { 0%, 100% { transform: translate(0,0); opacity: 0.4; } 50% { transform: translate(-1.4px,0); opacity: 0.2; } }
    </style>
  </defs>

  <g clip-path="url(#cardClip)">
    <rect x="0" y="0" width="900" height="230" fill="#0A0E12"/>
    <rect x="0" y="0" width="900" height="230" fill="url(#scanlines)"/>

    <rect x="0" y="0" width="900" height="32" fill="#111820"/>
    <circle cx="24" cy="16" r="6" fill="#FF5F56"/>
    <circle cx="44" cy="16" r="6" fill="#FFBD2E"/>
    <circle cx="64" cy="16" r="6" fill="#27C93F"/>
    <text x="450" y="20" font-size="12" fill="#6b7280" text-anchor="middle">zsh — roshzen@github</text>

    <g transform="translate(450,118)">
      <text class="ghost-c" text-anchor="middle" font-weight="700" font-size="40" fill="#00E5FF">&lt;Arun Roshan GJ /&gt;</text>
      <text class="ghost-m" text-anchor="middle" font-weight="700" font-size="40" fill="#FF3864">&lt;Arun Roshan GJ /&gt;</text>
      <text text-anchor="middle" font-weight="700" font-size="40" fill="#39FF14" filter="url(#glow)">&lt;Arun Roshan GJ /&gt;</text>
    </g>

    <g transform="translate(450,156)">
      <rect x="-60" y="-15" width="120" height="27" rx="13.5" fill="none" stroke="#39FF14" stroke-opacity="0.5"/>
      <text text-anchor="middle" y="5" font-size="13" fill="#c9d1d9">aka RoshZen</text>
    </g>

    <text x="450" y="200" text-anchor="middle" font-size="16" fill="#5fb85c">
      <tspan fill="#39FF14">$</tspan> whoami <tspan class="cursor" fill="#39FF14">█</tspan>
    </text>
  </g>

  <rect class="border-glow" x="2" y="2" width="896" height="226" rx="16" ry="16" fill="none" stroke="#39FF14" stroke-width="1.5"/>
</svg>
